name: Nifty 500 Screener
on:
  schedule:
    - cron: '30 4 * * 6'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Cache stock data
        uses: actions/cache@v4
        with:
          path: /tmp/nifty500_cache
          key: nifty500-v2-${{ steps.date.outputs.week }}

      - name: Install dependencies
        run: pip install yfinance pandas numpy ta requests gspread google-auth pytz

      - name: Run Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python Scanner.py
